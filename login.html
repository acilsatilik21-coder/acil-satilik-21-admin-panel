<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acente Girişi | Uzman Yönetim Paneli</title>
    <!-- Tailwind CSS ve FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Giriş Kartı (Login Card Container) -->
    <div class="max-w-md w-full bg-white rounded-2xl border border-slate-200 p-8 shadow-sm">
        
        <!-- Logo ve Başlık -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-900 text-white rounded-full mb-4 shadow-sm">
                <i class="fa-solid fa-lock text-xl"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">Acente Yönetim Paneli</h1>
            <p class="text-xs text-slate-400 mt-1 font-medium">Lütfen bilgilerinizi girerek oturum açın</p>
        </div>

        <!-- Hata Bildirim Kutusu -->
        <div id="errorAlert" class="mb-5 bg-rose-50 border border-rose-100 text-rose-600 text-xs font-semibold p-3.5 rounded-lg flex items-center gap-2 hidden">
            <i class="fa-solid fa-circle-exclamation text-sm"></i>
            <span id="errorMsg">E-posta veya şifre hatalı.</span>
        </div>

        <!-- Giriş Formu -->
        <form id="loginForm" onsubmit="handleLogin(event)" class="flex flex-col gap-5">
            <!-- E-posta -->
            <div>
                <label for="emailInput" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">E-posta Adresi</label>
                <div class="relative">
                    <input type="email" id="emailInput" required placeholder="ornek@domain.com" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition pl-9">
                    <i class="fa-solid fa-envelope absolute left-3 top-3.5 text-slate-400 text-xs"></i>
                </div>
            </div>

            <!-- Şifre -->
            <div>
                <label for="passwordInput" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Şifre</label>
                <div class="relative">
                    <input type="password" id="passwordInput" required placeholder="••••••••" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:border-slate-900 focus:bg-white focus:outline-none transition pl-9">
                    <i class="fa-solid fa-key absolute left-3 top-3.5 text-slate-400 text-xs"></i>
                </div>
            </div>

            <!-- Giriş Yap Butonu -->
            <button type="submit" id="btnLogin" class="w-full py-3 bg-slate-950 text-white font-bold rounded-xl text-xs tracking-wider uppercase hover:bg-slate-800 transition duration-150 flex items-center justify-center gap-2 shadow-sm mt-2">
                <span id="btnText">Oturum Aç</span>
                <i id="btnIcon" class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>

    </div>

    <!-- JavaScript - Supabase Auth Entegrasyonu -->
    <script>
        // Supabase Bağlantı Bilgileri (Kendi bilgileriniz)
        const SUPABASE_URL = "https://vabkxnntjrqrvvjtdcod.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYmt4bm50anJxcnZ2anRkY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTYxODcsImV4cCI6MjA5ODk3MjE4N30.qIt3Y92zHAgyrLAxf2L7PnzOf3AbYlktIQ3mQKN5uPA";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const errorAlert = document.getElementById('errorAlert');
            const errorMsg = document.getElementById('errorMsg');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            // Loading Efekti
            btnText.textContent = "Bağlanıyor...";
            btnIcon.className = "fa-solid fa-circle-notch animate-spin";
            errorAlert.classList.add('hidden');

            try {
                // Supabase üzerinden güvenli giriş kontrolü
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Giriş başarılı ise ana kontrol paneli sayfasına yönlendirme (index.html)
                window.location.href = "index.html";

            } catch (error) {
                // Hata durumunda bildirim gösterme
                console.error("Giriş hatası:", error.message);
                errorMsg.textContent = "Oturum açılamadı: Bilgilerinizi kontrol edin.";
                errorAlert.classList.remove('hidden');
                
                // Butonu eski haline getirme
                btnText.textContent = "Oturum Aç";
                btnIcon.className = "fa-solid fa-right-to-bracket";
            }
        }
    </script>
</body>
</html>
