<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli | Aktif Portföyünüz</title>
    <!-- Tailwind CSS ve FontAwesome CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased hidden" id="dashboardBody">

    <!-- 1. Üst Menü (Navbar) -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-gauge-high text-slate-900 text-2xl"></i>
                <span class="font-bold text-lg text-slate-900 tracking-tight">Uzman Yönetim Paneli</span>
            </div>
            <div class="flex items-center gap-6">
                <!-- Oturum Açan Danışman E-postası -->
                <span id="userEmailLabel" class="text-xs font-semibold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">...</span>
                <!-- Güvenli Çıkış Butonu -->
                <button onclick="handleLogout()" class="text-xs font-bold text-rose-600 hover:text-rose-800 transition flex items-center gap-1.5">
                    <i class="fa-solid fa-right-from-bracket"></i> Oturumu Kapat
                </button>
            </div>
        </div>
    </header>

    <!-- 2. Ana Panel İçeriği -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Üst Başlık ve Yeni İlan Ekleme -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
            <div>
                <h1 class="text-xl font-bold text-slate-950 tracking-tight">Aktif Portföyünüz</h1>
                <p id="welcomeMessage" class="text-xs text-slate-500 mt-1 font-medium">Hoş geldiniz, ilanlarınızı buradan yönetebilirsiniz.</p>
            </div>
            <!-- Yeni İlan Ekle Butonu -->
            <a href="add.html" class="inline-flex items-center justify-center gap-2 px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-xs tracking-wider uppercase transition shadow-sm">
                <i class="fa-solid fa-plus text-sm"></i> Yeni İlan Ekle
            </a>
        </div>

        <!-- İlanlar Tablosu / Listesi -->
        <div class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <!-- Loading Animasyonu -->
            <div id="loadingState" class="text-center py-20">
                <i class="fa-solid fa-circle-notch animate-spin text-slate-950 text-2xl mb-3"></i>
                <p class="text-slate-400 text-xs">Portföyünüz yükleniyor, lütfen bekleyin...</p>
            </div>

            <!-- Boş Portföy Uyarısı -->
            <div id="emptyState" class="text-center py-20 hidden">
                <i class="fa-regular fa-folder-open text-slate-200 text-5xl mb-4"></i>
                <h3 class="text-sm font-bold text-slate-900 mb-1">Henüz İlan Eklenmemiş</h3>
                <p class="text-slate-500 text-xs mb-4">Sistemde size ait kayıtlı aktif bir ilan bulunamadı.</p>
            </div>

            <!-- Tablo Yapısı -->
            <div id="tableContainer" class="overflow-x-auto hidden">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 font-semibold uppercase tracking-wider">
                            <th class="py-4 px-6 w-24">İlan No</th>
                            <th class="py-4 px-6">Görsel</th>
                            <th class="py-4 px-6">İlan Başlığı</th>
                            <th class="py-4 px-6 w-32">Fiyat</th>
                            <th class="py-4 px-6 w-36 text-center">İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="listingsTableBody" class="divide-y divide-slate-100 font-medium text-slate-700">
                        <!-- İlan Satırları Buraya Eklenecektir -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- JavaScript - Güvenlik ve İlan Yönetim Mantığı -->
    <script>
        // Supabase Bağlantı Bilgileriniz
        const SUPABASE_URL = "https://vabkxnntjrqrvvjtdcod.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYmt4bm50anJxcnZ2anRkY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTYxODcsImV4cCI6MjA5ODk3MjE4N30.qIt3Y92zHAgyrLAxf2L7PnzOf3AbYlktIQ3mQKN5uPA";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentAgentId = null;

        // 1. GÜVENLİK KONTROLÜ: Oturum açılmış mı kontrol et
        async function checkSession() {
            const { data: { session }, error } = await supabaseClient.auth.getSession();

            if (error || !session) {
                // Oturum yoksa doğrudan giriş sayfasına yönlendir
                window.location.href = "login.html";
                return;
            }

            // Oturum varsa e-postayı yazdır ve arayüzü göster
            document.getElementById('userEmailLabel').textContent = session.user.email;
            document.getElementById('dashboardBody').classList.remove('hidden');

            // Danışman kimliğini tespit et ve ilanları getir
            await getAgentIdentity(session.user.email);
        }

        // 2. Danışmanın e-postasını ID ile eşleştirme
        async function getAgentIdentity(email) {
            try {
                const { data: agent, error } = await supabaseClient
                    .from('agents')
                    .select('id, name')
                    .eq('email', email)
                    .single();

                if (error || !agent) throw error;

                currentAgentId = agent.id;
                document.getElementById('welcomeMessage').textContent = `Hoş geldiniz, Sayın ${agent.name}. Portföyünüzü buradan yönetebilirsiniz.`;
                
                // Danışmanın ilanlarını getir
                await fetchAgentListings();

            } catch (error) {
                console.error("Danışman kimlik tespiti hatası:", error.message);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        // 3. Sadece bu danışmana ait ilanları getirme
        async function fetchAgentListings() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('tableContainer').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const { data: listings, error } = await supabaseClient
                    .from('listings')
                    .select('*, images(image_url)')
                    .eq('agent_id', currentAgentId);

                if (error) throw error;

                const tbody = document.getElementById('listingsTableBody');
                tbody.innerHTML = '';

                if (!listings || listings.length === 0) {
                    document.getElementById('loadingState').classList.add('hidden');
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }

                listings.forEach(listing => {
                    const coverImage = (listing.images && listing.images.length > 0) 
                        ? listing.images[0].image_url 
                        : "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?auto=format&fit=crop&w=120&q=80";

                    const formattedPrice = new Intl.NumberFormat('tr-TR').format(listing.price);

                    const rowHtml = `
                        <tr class="hover:bg-slate-50 transition duration-150">
                            <td class="py-4 px-6 font-bold text-slate-500">ML-${listing.id}</td>
                            <td class="py-4 px-6">
                                <img src="${coverImage}" alt="İlan Resmi" class="w-14 h-10 object-cover rounded-lg border border-slate-200">
                            </td>
                            <td class="py-4 px-6">
                                <div class="font-bold text-slate-900">${listing.title}</div>
                                <div class="text-[10px] text-slate-400 mt-0.5">${listing.city} / ${listing.district || ''} / ${listing.neighborhood || ''}</div>
                            </td>
                            <td class="py-4 px-6 font-bold text-slate-900">${formattedPrice} ₺</td>
                            <td class="py-4 px-6">
                                <div class="flex items-center justify-center gap-2">
                                    <!-- Silme Butonu -->
                                    <button onclick="deleteListing(${listing.id})" class="px-3 py-2 bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold rounded-lg transition duration-150 flex items-center gap-1">
                                        <i class="fa-solid fa-trash-can"></i> Sil
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += rowHtml;
                });

                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('tableContainer').classList.remove('hidden');

            } catch (error) {
                console.error("İlanlar yüklenirken hata oluştu:", error.message);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        // 4. İlanı Silme Fonksiyonu
        async function deleteListing(id) {
            const isConfirmed = confirm("Bu ilanı sistemden kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.");
            if (!isConfirmed) return;

            try {
                // İlana ait görselleri ve ilanın kendisini silme
                const { error: imagesError } = await supabaseClient
                    .from('images')
                    .delete()
                    .eq('listing_id', id);

                if (imagesError) throw imagesError;

                const { error: listingError } = await supabaseClient
                    .from('listings')
                    .delete()
                    .eq('id', id);

                if (listingError) throw listingError;

                // Tabloyu yeniden güncelleme
                await fetchAgentListings();

            } catch (error) {
                console.error("İlan silinirken hata oluştu:", error.message);
                alert("İlan silinemedi: " + error.message);
            }
        }

        // 5. Oturumu Kapatma (Logout)
        async function handleLogout() {
            try {
                const { error } = await supabaseClient.auth.signOut();
                if (error) throw error;
                window.location.href = "login.html";
            } catch (error) {
                console.error("Oturum kapatma hatası:", error.message);
            }
        }

        // Sayfa yüklenirken oturumu denetle
        window.onload = checkSession;
    </script>
</body>
</html>
